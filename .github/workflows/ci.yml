name: CI — Lambda Delivery

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  ARTIFACT_BUCKET: interop-sgsss-artifacts
  LAMBDA_NAME: lambda-delivery

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run coverage:check
      - run: npm run security:check
      - run: npm run build
      - run: ls -la dist/lambda-delivery.zip

  publish:
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci && npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Subir .zip a S3
        run: |
          aws s3 cp dist/lambda-delivery.zip \
            s3://${{ env.ARTIFACT_BUCKET }}/lambda-delivery/latest.zip
          echo "✅ lambda-delivery.zip subido"